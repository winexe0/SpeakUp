server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to NVIDIA API to bypass CORS
    location /api/nvidia/ {
        proxy_pass https://integrate.api.nvidia.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host integrate.api.nvidia.com;
        proxy_set_header Authorization "Bearer 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";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy to NVIDIA TTS API
    location /api/tts/ {
        proxy_pass https://877104f7-e885-42b9-8de8-f6e4c6303969.invocation.api.nvcf.nvidia.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host 877104f7-e885-42b9-8de8-f6e4c6303969.invocation.api.nvcf.nvidia.com;
        proxy_set_header Authorization "Bearer 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";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
